services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: sentinelai-backend
    network_mode: "host"
    environment:
      - SERVICE_TYPE=backend
      - OLLAMA_HOST=http://127.0.0.1:11434
      - DATA_DIR=/app/data
      - VECTOR_STORE_DIR=/app/data/vectorstore
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    mem_limit: 2g
    memswap_limit: 3g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: sentinelai-frontend
    network_mode: "host"
    environment:
      - SERVICE_TYPE=frontend
      - API_BASE=http://127.0.0.1:8000
    volumes:
      - ../data:/app/data:ro
    mem_limit: 512m
    memswap_limit: 768m
    depends_on:
      - backend
    restart: unless-stopped

  watcher:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: sentinelai-watcher
    network_mode: "host"
    environment:
      - SERVICE_TYPE=watcher
      - WATCH_DIR=/app/data/inbox
      - API_BASE=http://127.0.0.1:8000
    volumes:
      - ../data:/app/data
    mem_limit: 256m
    memswap_limit: 384m
    restart: unless-stopped
